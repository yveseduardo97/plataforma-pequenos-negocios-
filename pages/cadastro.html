<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Produto</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<h2>Cadastrar Produto/Serviço</h2>

<form id="form">
    <input type="text" id="nome" placeholder="Nome do produto" required><br><br>
    <input type="text" id="descricao" placeholder="Descrição" required><br><br>
    <input type="text" id="contato" placeholder="Contato" required><br><br>

    <button type="submit">Cadastrar</button>
</form>

<script>
let form = document.getElementById("form");

form.addEventListener("submit", function(e) {
    e.preventDefault();

    let produto = {
        nome: document.getElementById("nome").value,
        descricao: document.getElementById("descricao").value,
        contato: document.getElementById("contato").value
    };

    let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
    produtos.push(produto);

    localStorage.setItem("produtos", JSON.stringify(produtos));

    alert("Produto cadastrado!");
    window.location.href = "../index.html";
});
</script>

</body>
</html>
